sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.24
control: pid
pid_Kp: 72.993
pid_Ki: 1.079
pid_Kd: 1234.486
min_temp: 0
max_temp: 130

[filament_switch_sensor RunoutSensor]
pause_on_runout: False
runout_gcode:
        SET_IDLE_TIMEOUT TIMEOUT=86400
	PAUSE 
	UNLOAD
switch_pin: !P1.28

