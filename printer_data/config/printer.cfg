[exclude_object]
# Enable arcs support
[gcode_arcs]
resolution: 0.1

[include toolhead_btt_ebbcan_G0B1_v1.2.cfg]
[include pressure_advance.cfg]
[include klicky-probe.cfg]
[include awd.cfg]
[include macros.cfg]
[include bed_screws.cfg]
[include bed_mesh.cfg]
[include probe.cfg]
[include input_shaper.cfg]
[include z_calibration.cfg]
[include adaptive_mesh.cfg]
[include servo.cfg]
#[include adxl345.cfg]

[save_variables]
filename: /home/sashi/printer_data/config/.variables.stb

[respond]
default_type: command

[virtual_sdcard]
path: /home/sashi/printer_data/gcodes

[display_status]

[pause_resume]

[mcu]
serial: /dev/serial/by-id/usb-Klipper_lpc1769_0BA0FF02A99869AFEBF2415EC62000F5-if00
restart_method: command

[temperature_sensor enclosure]
sensor_type: ATC Semitec 104GT-2
sensor_pin: P0.25

[idle_timeout]
timeout: 3600

[printer]
#kinematics: corexy
kinematics: limited_corexy
max_velocity: 300
max_accel: 22000
max_accel_to_decel: 11000
max_z_velocity: 25
max_z_accel: 30
max_x_accel: 22000
max_y_accel: 15000

[stepper_x]
step_pin: P2.2
dir_pin: P2.3
enable_pin: !P2.1
rotation_distance: 40
endstop_pin: ^can0:LIMIT_3
position_endstop: 13
position_min: 13
position_max: 335
homing_speed: 50
homing_retract_dist: 10
second_homing_speed: 10.0
microsteps: 16
full_steps_per_rotation: 400

[tmc2209 stepper_x]
uart_pin: P1.1
interpolate: false
run_current: 1
stealthchop_threshold: 0

[stepper_x1]
step_pin: P1.9
dir_pin: P1.14
enable_pin: !P0.10
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 400

[tmc2209 stepper_x1]
uart_pin: P1.17
interpolate: false
run_current: 1
stealthchop_threshold: 0

[stepper_y]
step_pin: P0.19
dir_pin: !P0.20
enable_pin: !P2.8
rotation_distance: 40
endstop_pin: !P1.27
position_endstop: 330
position_min: 16
position_max: 340
homing_retract_dist: 10
homing_speed: 50.0
second_homing_speed: 10.0
microsteps: 16
full_steps_per_rotation: 400

[tmc2209 stepper_y]
uart_pin: P1.8
interpolate: false
run_current: 1
stealthchop_threshold: 0

[stepper_y1]
step_pin: P2.13
dir_pin: P0.11
enable_pin: !P2.12
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 400

[tmc2209 stepper_y1]
uart_pin: P1.15
interpolate: false
run_current: 1
stealthchop_threshold: 0

[stepper_z]
step_pin: P0.22
dir_pin: P2.11
enable_pin: !P0.21
rotation_distance: 4
microsteps: 32
endstop_pin: P1.24
#endstop_pin: probe:z_virtual_endstop
position_max: 400
position_min: -30
position_endstop = 4.25
full_steps_per_rotation: 200

[tmc2209 stepper_z]
uart_pin: P1.10
interpolate: false
run_current: 0.5
stealthchop_threshold: 0

